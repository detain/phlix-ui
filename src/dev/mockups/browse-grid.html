<!DOCTYPE html>
<html lang="en" data-theme="nocturne">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nocturne — Browse Grid + Filter Bar</title>
<link rel="stylesheet" href="./nocturne.css" />
<style>
  body { min-height: 100vh; position: relative; }

  /* ambient glow keyed off the hero poster */
  .ambient {
    position: fixed; inset: -10% -10% auto -10%; height: 70vh; z-index: 0; pointer-events: none;
    background: radial-gradient(60% 60% at 20% 0%, var(--ambient), transparent 70%),
                radial-gradient(50% 50% at 85% 10%, rgba(90,169,214,0.10), transparent 70%);
    filter: blur(40px);
  }

  .shell { position: relative; z-index: 1; max-width: 1320px; margin: 0 auto; padding: 0 var(--space-8) var(--space-20); }

  /* ---- top bar ---- */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: var(--space-6);
    padding: var(--space-4) var(--space-8); margin: 0 calc(-1 * var(--space-8)) var(--space-8);
    background: var(--surface-glass); backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border-subtle);
  }
  .brand { display: flex; align-items: center; gap: var(--space-3); }
  .brand .mark { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
    background: var(--accent); color: var(--accent-contrast); box-shadow: var(--glow-amber); }
  .brand .mark svg { width: 18px; height: 18px; }
  .brand .name { font-family: var(--font-display); font-weight: 600; font-size: var(--text-lg);
    letter-spacing: var(--tracking-tight); }
  .brand .name b { color: var(--accent); font-weight: 600; }
  .nav { display: flex; gap: var(--space-1); margin-left: var(--space-4); }
  .nav a { font-size: var(--text-sm); font-weight: 600; color: var(--text-muted);
    padding: var(--space-2) var(--space-3); border-radius: var(--radius-md); }
  .nav a.active { color: var(--text); background: var(--surface-2); }
  .topbar .spacer { flex: 1; }
  .cmdk {
    display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-sm);
    color: var(--text-subtle); background: var(--surface); border: 1px solid var(--border);
    padding: var(--space-2) var(--space-3); border-radius: var(--radius-md); }
  .cmdk kbd { font-family: var(--font-mono); font-size: var(--text-2xs); background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; color: var(--text-muted); }
  .avatar { width: 34px; height: 34px; border-radius: var(--radius-full); background: var(--surface-3);
    border: 1px solid var(--border-strong); display: grid; place-items: center; color: var(--text-muted); }

  /* ---- hero / continue watching ---- */
  .section-head { display: flex; align-items: baseline; gap: var(--space-3); margin: var(--space-10) 0 var(--space-4); }
  .section-head h2 { font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl);
    letter-spacing: var(--tracking-tight); }
  .section-head .count { font-size: var(--text-sm); color: var(--text-subtle); }
  .section-head a { margin-left: auto; font-size: var(--text-sm); font-weight: 600; color: var(--accent); }

  .rail { display: grid; grid-auto-flow: column; grid-auto-columns: 300px; gap: var(--space-4);
    overflow-x: auto; padding-bottom: var(--space-3); scroll-snap-type: x mandatory; }
  .rail::-webkit-scrollbar { height: 6px; }
  .rail::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: var(--radius-full); }
  .cw {
    position: relative; aspect-ratio: 16/9; border-radius: var(--radius-lg); overflow: hidden;
    scroll-snap-align: start; box-shadow: var(--shadow-2); cursor: pointer; isolation: isolate;
    transition: transform var(--dur-base) var(--ease-out);
  }
  .cw:hover { transform: translateY(-4px); }
  .cw img { width: 100%; height: 100%; object-fit: cover; }
  .cw__scrim { position: absolute; inset: 0; padding: var(--space-4); display: flex; flex-direction: column;
    justify-content: flex-end; background: linear-gradient(to top, rgba(8,6,3,0.92), transparent 70%); }
  .cw__title { font-family: var(--font-display); font-weight: 600; font-size: var(--text-md); color: #fff; }
  .cw__sub { font-size: var(--text-xs); color: rgba(255,255,255,0.7); margin-top: 2px; }
  .cw__bar { position: absolute; left: var(--space-4); right: var(--space-4); bottom: var(--space-3);
    height: 4px; border-radius: var(--radius-full); background: rgba(255,255,255,0.25); }
  .cw__bar > i { display: block; height: 100%; background: var(--accent); border-radius: inherit;
    box-shadow: 0 0 8px var(--accent); }
  .cw__play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.9);
    width: 56px; height: 56px; border-radius: var(--radius-full); display: grid; place-items: center;
    background: var(--surface-glass-strong); border: 1px solid var(--border-strong); opacity: 0;
    transition: all var(--dur-base) var(--ease-spring); }
  .cw__play svg { width: 24px; height: 24px; color: #fff; }
  .cw:hover .cw__play { opacity: 1; transform: translate(-50%,-50%) scale(1); }

  /* ---- filter bar ---- */
  .filterbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: var(--space-3);
    padding: var(--space-3); border-radius: var(--radius-xl);
    background: var(--surface-glass); backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle); box-shadow: var(--shadow-2);
  }
  .search { position: relative; flex: 1 1 280px; min-width: 220px; }
  .search svg { position: absolute; left: var(--space-3); top: 50%; transform: translateY(-50%);
    width: 17px; height: 17px; color: var(--text-subtle); }
  .search input {
    width: 100%; padding: var(--space-3) var(--space-3) var(--space-3) var(--space-10);
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    color: var(--text); font-size: var(--text-sm); outline: none;
    transition: border-color var(--dur-base), box-shadow var(--dur-base); }
  .search input::placeholder { color: var(--text-subtle); }
  .search input:focus { border-color: var(--accent-ring); box-shadow: 0 0 0 3px var(--accent-soft); }

  .ctrl {
    display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-sm); font-weight: 600;
    color: var(--text-muted); background: var(--surface); border: 1px solid var(--border);
    padding: var(--space-3) var(--space-3); border-radius: var(--radius-md);
    transition: all var(--dur-base) var(--ease-out); white-space: nowrap; }
  .ctrl:hover { color: var(--text); border-color: var(--border-strong); }
  .ctrl svg { width: 15px; height: 15px; }
  .ctrl .caret { color: var(--text-subtle); }

  .chips { display: flex; gap: var(--space-2); }
  .chip {
    font-size: var(--text-sm); font-weight: 600; padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-full); border: 1px solid var(--border); background: var(--surface);
    color: var(--text-muted); transition: all var(--dur-base) var(--ease-out); }
  .chip[aria-pressed='true'] { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-ring); }

  /* active filter pills + count row */
  .activerow { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap;
    margin: var(--space-4) 0 var(--space-2); }
  .result-count { font-size: var(--text-sm); color: var(--text-muted); }
  .result-count b { color: var(--text); font-family: var(--font-mono); }
  .pills { display: flex; gap: var(--space-2); flex-wrap: wrap; }
  .pill {
    display: inline-flex; align-items: center; gap: var(--space-2);
    font-size: var(--text-xs); font-weight: 600; padding: var(--space-1) var(--space-1) var(--space-1) var(--space-3);
    border-radius: var(--radius-full); background: var(--accent-soft); color: var(--accent);
    border: 1px solid var(--accent-ring); }
  .pill button { width: 18px; height: 18px; display: grid; place-items: center; border-radius: 50%;
    color: var(--accent); opacity: 0.8; }
  .pill button:hover { background: rgba(245,165,36,0.2); opacity: 1; }
  .pill button svg { width: 11px; height: 11px; }
  .clear-all { font-size: var(--text-xs); font-weight: 600; color: var(--text-subtle); margin-left: auto; }

  /* ---- the grid ---- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: var(--space-6) var(--space-5); margin-top: var(--space-4); }

  .card { position: relative; cursor: pointer; }
  .card__poster { position: relative; aspect-ratio: 2/3; border-radius: var(--radius-lg); overflow: hidden;
    background: linear-gradient(145deg, var(--surface-3), var(--surface)); box-shadow: var(--shadow-2);
    transition: transform var(--dur-slow) var(--ease-out), box-shadow var(--dur-slow) var(--ease-out); }
  .card__poster img { width: 100%; height: 100%; object-fit: cover;
    transition: transform var(--dur-slower) var(--ease-out); }
  .card:hover .card__poster { transform: translateY(-6px); box-shadow: var(--shadow-4); }
  .card:hover .card__poster img { transform: scale(1.06); }
  .card__badges { position: absolute; top: var(--space-2); left: var(--space-2); right: var(--space-2);
    display: flex; gap: var(--space-1); }
  .badge { font-size: var(--text-2xs); font-weight: 700; letter-spacing: var(--tracking-wide);
    text-transform: uppercase; padding: 2px var(--space-2); border-radius: var(--radius-sm);
    backdrop-filter: blur(8px); }
  .badge--new { background: var(--accent); color: var(--accent-contrast); }
  .badge--q { margin-left: auto; background: var(--surface-glass-strong); color: var(--text);
    border: 1px solid var(--border-strong); font-family: var(--font-mono); }
  .card__t { font-family: var(--font-display); font-weight: 500; font-size: var(--text-sm);
    margin-top: var(--space-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: var(--tracking-snug); }
  .card__s { font-size: var(--text-xs); color: var(--text-subtle); margin-top: 2px; }
  .card__prog { position: absolute; left: var(--space-2); right: var(--space-2); bottom: var(--space-2);
    height: 3px; background: rgba(255,255,255,0.22); border-radius: var(--radius-full); }
  .card__prog > i { display: block; height: 100%; background: var(--accent); border-radius: inherit; }

  .theme-switch { display: flex; gap: var(--space-2); }
  .theme-switch button { font-size: var(--text-xs); font-weight: 600; padding: 6px var(--space-3);
    border-radius: var(--radius-full); border: 1px solid var(--border); background: var(--surface);
    color: var(--text-muted); }
  .theme-switch button[aria-pressed='true'] { background: var(--accent-soft); color: var(--accent);
    border-color: var(--accent-ring); }
</style>
</head>
<body>
  <div class="ambient"></div>
  <div class="nocturne-grain"></div>
  <div class="nocturne-vignette"></div>

  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="mark"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 3.5v17a1 1 0 0 0 1.5.87l14-8.5a1 1 0 0 0 0-1.74l-14-8.5A1 1 0 0 0 4 3.5Z"/></svg></span>
        <span class="name">Ph<b>lix</b></span>
      </div>
      <nav class="nav">
        <a class="active" href="#">Browse</a>
        <a href="#">Movies</a>
        <a href="#">Series</a>
        <a href="#">My List</a>
      </nav>
      <span class="spacer"></span>
      <button class="cmdk">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        Search everything <kbd>⌘K</kbd>
      </button>
      <div class="theme-switch" role="group" aria-label="Theme">
        <button aria-pressed="true"  onclick="setT('nocturne',this)">Nocturne</button>
        <button aria-pressed="false" onclick="setT('daylight',this)">Daylight</button>
        <button aria-pressed="false" onclick="setT('midnight',this)">Midnight</button>
      </div>
      <div class="avatar"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></div>
    </header>

    <!-- continue watching rail -->
    <div class="section-head">
      <h2>Continue Watching</h2>
      <a href="#">See all</a>
    </div>
    <div class="rail">
      <article class="cw">
        <img src="https://image.tmdb.org/t/p/w780/iADOJ8Zymht2JPMoy3R7xceZprc.jpg" alt="Dune" />
        <div class="cw__scrim"><div class="cw__title">Dune: Part Two</div><div class="cw__sub numeric">48m left · S—·E—</div></div>
        <div class="cw__play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11-6.86a1 1 0 0 0 0-1.72l-11-6.86A1 1 0 0 0 8 5.14Z"/></svg></div>
        <div class="cw__bar"><i style="width:62%"></i></div>
      </article>
      <article class="cw">
        <img src="https://image.tmdb.org/t/p/w780/8YFL5QQVPy3AgrEQxNYVSgiPEbe.jpg" alt="Bttf" />
        <div class="cw__scrim"><div class="cw__title">Back to the Future</div><div class="cw__sub numeric">1h 02m left</div></div>
        <div class="cw__play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11-6.86a1 1 0 0 0 0-1.72l-11-6.86A1 1 0 0 0 8 5.14Z"/></svg></div>
        <div class="cw__bar"><i style="width:33%"></i></div>
      </article>
      <article class="cw">
        <img src="https://image.tmdb.org/t/p/w780/4woSOUD0equAYzvwhWBHIJDCM88.jpg" alt="Alien" />
        <div class="cw__scrim"><div class="cw__title">Alien</div><div class="cw__sub numeric">22m left</div></div>
        <div class="cw__play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11-6.86a1 1 0 0 0 0-1.72l-11-6.86A1 1 0 0 0 8 5.14Z"/></svg></div>
        <div class="cw__bar"><i style="width:81%"></i></div>
      </article>
    </div>

    <!-- filter bar -->
    <div class="section-head">
      <h2>Browse</h2>
      <span class="count numeric">the library</span>
    </div>
    <div class="filterbar">
      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input type="search" placeholder="Search titles, people, genres…" value="" />
      </label>
      <button class="ctrl">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M7 12h10M10 17h4"/></svg>
        Genres <span class="caret">▾</span>
      </button>
      <button class="ctrl">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
        1980 – 2024 <span class="caret">▾</span>
      </button>
      <div class="chips" role="group" aria-label="Rating">
        <button class="chip" aria-pressed="false">PG</button>
        <button class="chip" aria-pressed="true">PG-13</button>
        <button class="chip" aria-pressed="true">R</button>
      </div>
      <button class="ctrl">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 4v16M7 20l-3-3M7 4l3 3M17 20V4M17 4l-3 3M17 20l3-3"/></svg>
        Year ↓ <span class="caret">▾</span>
      </button>
    </div>

    <!-- active filters + count -->
    <div class="activerow">
      <span class="result-count"><b>1,284</b> titles</span>
      <div class="pills">
        <span class="pill">Sci-Fi <button aria-label="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button></span>
        <span class="pill">PG-13 <button aria-label="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button></span>
        <span class="pill">R <button aria-label="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button></span>
      </div>
      <a class="clear-all" href="#">Clear all</a>
    </div>

    <!-- grid -->
    <div class="grid" id="grid"></div>
  </div>

<script>
  const items = [
    ['Dune: Part Two','2024','166m','9O7gLzmreU0nGkIB6K3BsJbzvNv.jpg','new','4K·HDR',null],
    ['Blade Runner 2049','2017','164m','8b8R8l88Qje9dn9OE8PY05Nxl1X.jpg',null,'4K',null],
    ['Mad Max: Fury Road','2015','120m','qJ2tW6WMUDux911r6m7haRef0WH.jpg',null,'4K·HDR',62],
    ['Arrival','2016','116m','kqjL17yufvn9OVLyXYpvtyrFfak.jpg',null,null,18],
    ['Interstellar','2014','169m','gEU2QniE6E77NI6lCU6MxlNBvIx.jpg',null,'4K',null],
    ['The Batman','2022','176m','74xTEgt7R36Fpooo50r9T25onhq.jpg','new',null,null],
    ['Sicario','2015','121m','lz8vNyXeidqqOdJW9ZjnDuMC09l.jpg',null,null,null],
    ['Oppenheimer','2023','180m','8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg','new','4K·HDR',null],
    ['Gravity','2013','91m','q9NHHL4z2eLN5KGGqLcb8M5XYbT.jpg',null,null,45],
    ['Edge of Tomorrow','2014','113m','uUiId6cG32JSRI6RyBQSvQtLjz2.jpg',null,'4K',null],
    ['Tenet','2020','150m','k68nPLbIST6NP96JmTxmZ5jzoX9.jpg',null,'4K·HDR',null],
    ['Ex Machina','2014','108m','dmJW8IAKHKxFNiUnoDR7JfsK7Rp.jpg',null,null,null],
  ];
  const close='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 6l12 12M18 6 6 18"/></svg>';
  document.getElementById('grid').innerHTML = items.map(it=>{
    const [t,y,r,img,nw,q,prog]=it;
    return `<article class="card">
      <div class="card__poster">
        <div class="card__badges">
          ${nw?'<span class="badge badge--new">New</span>':''}
          ${q?`<span class="badge badge--q">${q}</span>`:''}
        </div>
        <img loading="lazy" src="https://image.tmdb.org/t/p/w500/${img}" alt="${t}" />
        ${prog?`<div class="card__prog"><i style="width:${prog}%"></i></div>`:''}
      </div>
      <div class="card__t">${t}</div>
      <div class="card__s numeric">${y} · ${r}</div>
    </article>`;
  }).join('');

  function setT(t, btn){
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-switch button').forEach(b=>b.setAttribute('aria-pressed', b===btn));
  }
</script>
</body>
</html>
